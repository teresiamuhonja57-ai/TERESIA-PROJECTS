<div class="converter-container">
    <h1>Currency Converter</h1>
    
    <div class="input-group">
        <input type="number" id="amount" value="1" min="1">
        
        <select id="from-currency"></select>
        
        <button id="switch-btn"><i class="fa-solid fa-repeat"></i></button>
        
        <select id="to-currency"></select>
    </div>

    <div id="result-area">
        <p id="conversion-text">Select currencies to begin...</p>
    </div>
</div>
<script>
const API_KEY = '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'; // Replace with your actual key
const fromSelect = document.getElementById('from-currency');
const toSelect = document.getElementById('to-currency');
const amountInput = document.getElementById('amount');
const resultText = document.getElementById('conversion-text');
const switchBtn = document.getElementById('switch-btn');

// 1. Fetch supported currencies and populate selects
async function initCurrencies() {
    try {
        const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/codes`);
        const data = await response.json();
        
        const codes = data.supported_codes; // Returns array of [ ["USD", "United States Dollar"], ...]
        
        codes.forEach(([code, name]) => {
            const option1 = new Option(`${code} - ${name}`, code);
            const option2 = new Option(`${code} - ${name}`, code);
            fromSelect.add(option1);
            toSelect.add(option2);
        });

        // Set defaults
        fromSelect.value = "USD";
        toSelect.value = "EUR";
        
        calculate(); // Initial calculation
    } catch (err) {
        console.error("Initialization failed", err);
    }
}

// 2. Fetch pair conversion rate
async function calculate() {
    const from = fromSelect.value;
    const to = toSelect.value;
    const amount = amountInput.value;

    if (amount === "" || amount <= 0) return;

    try {
        const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/pair/${from}/${to}/${amount}`);
        const data = await response.json();
        
        if (data.result === "success") {
            const convertedAmount = data.conversion_result.toFixed(2);
            resultText.innerText = `${amount} ${from} = ${convertedAmount} ${to}`;
        }
    } catch (err) {
        resultText.innerText = "Error fetching conversion data.";
    }
}

// Bonus: Switch Button Logic
switchBtn.addEventListener('click', () => {
    const temp = fromSelect.value;
    fromSelect.value = toSelect.value;
    toSelect.value = temp;
    calculate();
});

// Event Listeners for automatic updates
[fromSelect, toSelect, amountInput].forEach(el => {
    el.addEventListener('change', calculate);
});
amountInput.addEventListener('input', calculate);

// Start the app
initCurrencies();
</script>
